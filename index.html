<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARC | THE SOVEREIGN VAULT</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sovereign: ['Cinzel', 'serif'], sans: ['Plus Jakarta Sans', 'sans-serif'] },
                    colors: { royalUmber: '#1E1611', liquidGold: '#D4AF37' }
                }
            }
        }
    </script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0A0807; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 0; }
        #ui-layer { position: relative; z-index: 10; pointer-events: none; }
        .interactive-btn { pointer-events: auto; }
        .gold-grad-text { background: linear-gradient(135deg, #FFF 30%, #D4AF37 70%, #AA771C 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-panel { background: rgba(10, 8, 7, 0.6); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
    </style>
</head>
<body class="font-sans antialiased text-white">

    <div id="canvas-container"></div>

    <main id="ui-layer" class="w-full h-screen flex flex-col justify-center items-center px-4">
        <div class="glass-panel p-10 md:p-16 rounded-2xl max-w-4xl w-full text-center shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-16 h-16 border-t-2 border-l-2 border-liquidGold/40 m-4"></div>
            <div class="absolute bottom-0 right-0 w-16 h-16 border-b-2 border-r-2 border-liquidGold/40 m-4"></div>

            <h1 class="font-sovereign text-5xl md:text-7xl font-black tracking-tighter mb-6">
                ENTER THE <br /> <span class="gold-grad-text">ARC MATRIX</span>
            </h1>
            
            <p class="text-sm md:text-base text-gray-300 tracking-[0.2em] uppercase font-light max-w-2xl mx-auto mb-10 leading-relaxed">
                The physics of wealth have been hidden. The 3D geometry of the new economy is reserved for operators.
            </p>

            <a href="https://your-gumroad-link.com" class="interactive-btn inline-block px-12 py-5 bg-royalUmber border border-liquidGold text-liquidGold font-sovereign text-xs font-black tracking-[0.3em] uppercase transition-all duration-500 hover:bg-liquidGold hover:text-black hover:shadow-[0_0_30px_rgba(212,175,55,0.4)]">
                Unlock The Architecture
            </a>
        </div>
    </main>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        // Add a very subtle dark imperial purple fog to blend the 3D object into the background
        scene.fog = new THREE.FogExp2(0x0A0807, 0.02);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.getElementById('canvas-container').appendChild(renderer.domElement);

        // 2. The Golden Vault Geometry (Complex Torus Knot)
        const geometry = new THREE.TorusKnotGeometry(12, 3.5, 300, 40, 2, 3);
        
        // 3. Hyper-Realistic Metallic Material
        const material = new THREE.MeshStandardMaterial({
            color: 0xD4AF37,        // Liquid Gold
            metalness: 0.9,         // Highly metallic
            roughness: 0.15,        // Very smooth/reflective
            wireframe: false
        });

        const torusKnot = new THREE.Mesh(geometry, material);
        scene.add(torusKnot);

        // 4. Floating Particles (Gold Dust)
        const particleGeometry = new THREE.BufferGeometry();
        const particleCount = 1500;
        const posArray = new Float32Array(particleCount * 3);
        for(let i = 0; i < particleCount * 3; i++) {
            posArray[i] = (Math.random() - 0.5) * 100; // Spread across the scene
        }
        particleGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.15,
            color: 0xD4AF37,
            transparent: true,
            opacity: 0.6,
            blending: THREE.AdditiveBlending
        });
        const particleMesh = new THREE.Points(particleGeometry, particleMaterial);
        scene.add(particleMesh);

        // 5. Studio Lighting (Crucial for realism)
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xffffff, 2);
        pointLight1.position.set(20, 20, 20);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0x00E5FF, 1.5); // Cyan underglow
        pointLight2.position.set(-20, -20, -20);
        scene.add(pointLight2);

        const pointLight3 = new THREE.PointLight(0x8B0000, 2); // Crimson side glow
        pointLight3.position.set(20, -20, 10);
        scene.add(pointLight3);

        camera.position.z = 40;

        // 6. Interactive Mouse Tracking
        let mouseX = 0;
        let mouseY = 0;
        let targetX = 0;
        let targetY = 0;
        const windowHalfX = window.innerWidth / 2;
        const windowHalfY = window.innerHeight / 2;

        document.addEventListener('mousemove', (event) => {
            mouseX = (event.clientX - windowHalfX) * 0.001;
            mouseY = (event.clientY - windowHalfY) * 0.001;
        });

        // 7. Animation Loop
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const elapsedTime = clock.getElapsedTime();

            // Smooth mouse follow rotation
            targetX = mouseX * 0.5;
            targetY = mouseY * 0.5;
            
            torusKnot.rotation.y += 0.05 * (targetX - torusKnot.rotation.y);
            torusKnot.rotation.x += 0.05 * (targetY - torusKnot.rotation.x);
            
            // Constant base rotation
            torusKnot.rotation.z += 0.002;
            torusKnot.rotation.y += 0.001;

            // Animate particles
            particleMesh.rotation.y = -elapsedTime * 0.05;
            particleMesh.rotation.x = elapsedTime * 0.02;

            // Slowly pulse the geometry
            torusKnot.scale.set(
                1 + Math.sin(elapsedTime * 0.5) * 0.02,
                1 + Math.sin(elapsedTime * 0.5) * 0.02,
                1 + Math.sin(elapsedTime * 0.5) * 0.02
            );

            renderer.render(scene, camera);
        }

        // 8. Responsive Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
